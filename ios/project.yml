name: PocketMac
options:
  bundleIdPrefix: com.innoedge
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false

packages:
  PocketMacKit:
    path: ../shared/PocketMacKit

targets:
  PocketMacApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PocketMac
    dependencies:
      - package: PocketMacKit
        product: PocketMacKit
    settings:
      base:
        PRODUCT_NAME: PocketMac
        PRODUCT_BUNDLE_IDENTIFIER: com.innoedge.pocketmac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PocketMac/Resources/Info.plist
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Automatic development signing (personal team). Simulator builds ignore it; device builds
        # get a real signature. Override CODE_SIGNING_ALLOWED=NO on the command line for sim-only CI.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7T7BJT2AU7
        CODE_SIGN_IDENTITY: "Apple Development"

schemes:
  PocketMacApp:
    build:
      targets:
        PocketMacApp: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
